<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISMATEC - Soporte Técnico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <button id="dismac-logo-btn" class="logo-btn" title="Volver al inicio">
                        <div class="logo-icon">
                            <span class="logo-text">DM</span>
                        </div>
                        <span class="logo-label">DISMATEC</span>
                    </button>
                </div>
                <div class="header-status">
                    <span id="sync-status" class="sync-indicator hidden">
                        <i class="bi bi-exclamation-circle"></i> Error de conexión
                    </span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- View: Dashboard -->
            <div id="view-dashboard" class="main-content-view">
                <div class="dashboard-container">
                    <div class="welcome-section">
                        <h1 class="welcome-title">Bienvenido</h1>
                        <p class="welcome-subtitle">Sistema de Gestión de Servicio Técnico</p>
                    </div>

                    <div class="options-grid">
                        <button data-action="open-red-talleres" class="option-card">
                            <div class="option-icon">
                                <i class="bi bi-shop"></i>
                            </div>
                            <h2 class="option-title">Red de Talleres</h2>
                            <p class="option-description">Contactos regionales y ubicaciones</p>
                            <div class="option-arrow">
                                <i class="bi bi-chevron-right"></i>
                            </div>
                        </button>

                        <button data-action="open-estados-servicio" class="option-card">
                            <div class="option-icon">
                                <i class="bi bi-clipboard-check"></i>
                            </div>
                            <h2 class="option-title">Estados de Servicio</h2>
                            <p class="option-description">Seguimiento de órdenes de trabajo</p>
                            <div class="option-arrow">
                                <i class="bi bi-chevron-right"></i>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- View: Red de Talleres Menu -->
            <div id="view-red-talleres" class="main-content-view hidden">
                <div class="view-header">
                    <h2>Red de Talleres</h2>
                    <p>Selecciona una región para ver los talleres disponibles</p>
                </div>

                <div class="regions-grid">
                    <button data-action="view-tarija" class="region-card">
                        <span class="region-name">Tarija</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button data-action="view-sucre" class="region-card">
                        <span class="region-name">Sucre</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button data-action="view-santacruz" class="region-card">
                        <span class="region-name">Santa Cruz</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>

                <div class="action-section">
                    <button data-action="view-protocolo" class="protocol-card">
                        <div class="protocol-icon">
                            <i class="bi bi-file-earmark-text"></i>
                        </div>
                        <div class="protocol-content">
                            <h3>Protocolo de Recepción</h3>
                            <p>Procedimientos y pasos a seguir</p>
                        </div>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>

                <button id="btn-back-red-talleres" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Volver
                </button>
            </div>

            <!-- View: Estados de Servicio Menu -->
            <div id="view-estados-menu" class="main-content-view hidden">
                <div class="view-header">
                    <h2>Estados de Servicio</h2>
                    <p>Selecciona una región para consultar órdenes</p>
                </div>

                <div class="regions-grid">
                    <button data-action="view-estados-tarija" class="region-card">
                        <span class="region-name">Tarija</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button data-action="view-estados-sucre" class="region-card">
                        <span class="region-name">Sucre</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button data-action="view-estados-municipios" class="region-card">
                        <span class="region-name">Municipios (SC)</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button data-action="view-estados-oruro" class="region-card">
                        <span class="region-name">Oruro</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button data-action="view-estados-beni" class="region-card">
                        <span class="region-name">Beni</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                    <button data-action="view-estados-potosi" class="region-card">
                        <span class="region-name">Potosí</span>
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>

                <button id="btn-back-estados-menu" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Volver
                </button>
            </div>

            <!-- View: Talleres Details -->
            <div id="view-details" class="main-content-view hidden">
                <div class="details-header">
                    <button id="btn-back" class="btn-back-header">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <h2 id="view-title">Detalles</h2>
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input 
                            type="text" 
                            id="workshop-search-input" 
                            placeholder="Buscar taller..."
                            class="search-input"
                        >
                    </div>
                </div>

                <div id="view-content" class="view-content"></div>

                <button id="btn-back" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Volver
                </button>
            </div>

            <!-- View: Estados de Servicio -->
            <div id="view-estados-servicio" class="main-content-view hidden">
                <div class="estados-header">
                    <button id="btn-back-estados-header" class="btn-back-header">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <h2 id="view-estados-title">Órdenes</h2>
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input 
                            type="text" 
                            id="estados-search-input" 
                            placeholder="Buscar orden..."
                            class="search-input"
                        >
                    </div>
                </div>

                <div id="estados-content" class="view-content"></div>

                <button id="btn-back-estados-list" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Volver
                </button>
            </div>
        </main>

        <!-- Loading Indicator -->
        <div id="loading-overlay" class="loading-overlay">
            <div class="spinner"></div>
            <p>Cargando datos...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
